[package]
name = "hyperscape_prediction_market"
version = "0.1.0"
description = "Hyperscape prediction oracle + duel market program"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "hyperscape_prediction_market"

[features]
default = []
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
anchor-lang = { version = "0.31.1", features = ["init-if-needed"] }
anchor-spl = "0.31.1"
