[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.24"
evm_version = "cancun"
ffi = false
ast = true
build_info = true
extra_output = ["abi", "evm.bytecode"]
# MUD requires these remappings to find its packages
# Additional remappings are in remappings.txt

[profile.default.optimizer]
enabled = true
runs = 1000

[profile.local]
eth_rpc_url = "http://127.0.0.1:8545"
chain_id = 31337

[profile.base-sepolia]
eth_rpc_url = "${BASE_SEPOLIA_RPC_URL}"
chain_id = 84532
verify = true
etherscan_api_key = "${BASESCAN_API_KEY}"

[profile.base-mainnet]
eth_rpc_url = "${BASE_RPC_URL}"
chain_id = 8453
verify = true
etherscan_api_key = "${BASESCAN_API_KEY}"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
