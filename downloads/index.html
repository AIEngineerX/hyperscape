<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperscape Downloads</title>
    <style>
      :root {
        --bg: #091018;
        --panel: #111e2c;
        --panel-2: #17283a;
        --text: #eff6ff;
        --muted: #a3b7d0;
        --accent: #3fc4ff;
        --accent-hover: #71d4ff;
        --ok: #45d18c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Inter", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 0%, #1f3a57 0%, transparent 45%),
          radial-gradient(circle at 80% 20%, #144864 0%, transparent 35%),
          linear-gradient(180deg, #070d14 0%, var(--bg) 100%);
        min-height: 100vh;
      }

      .container {
        width: min(1000px, 92vw);
        margin: 0 auto;
        padding: 3rem 0 4rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .meta {
        margin-top: 1.5rem;
        padding: 1rem 1.1rem;
        border-radius: 0.8rem;
        background: color-mix(in oklab, var(--panel), black 8%);
        border: 1px solid #27405a;
      }

      .meta p {
        margin: 0.25rem 0;
      }

      .meta strong {
        color: var(--ok);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 1rem;
        margin-top: 1.4rem;
      }

      .card {
        background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
        border: 1px solid #27405a;
        border-radius: 0.95rem;
        padding: 1rem;
      }

      .card h2 {
        margin: 0 0 0.45rem;
        font-size: 1.1rem;
      }

      .card p {
        margin: 0 0 0.9rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        font-weight: 700;
        color: #001426;
        background: var(--accent);
        border-radius: 0.55rem;
        padding: 0.58rem 0.9rem;
      }

      .btn:hover {
        background: var(--accent-hover);
      }

      .missing {
        color: #ffbd9a;
        font-size: 0.9rem;
      }

      .asset-list {
        margin-top: 1.75rem;
        padding: 1rem 1.1rem;
        border-radius: 0.8rem;
        background: color-mix(in oklab, var(--panel), black 10%);
        border: 1px solid #27405a;
      }

      .asset-list h3 {
        margin-top: 0;
      }

      ul {
        padding-left: 1.1rem;
      }

      li {
        margin: 0.28rem 0;
      }

      a {
        color: var(--accent-hover);
      }

      .footer {
        margin-top: 1.6rem;
        color: var(--muted);
      }

      .error {
        margin-top: 1rem;
        padding: 0.9rem 1rem;
        border-radius: 0.7rem;
        border: 1px solid #5a2a2a;
        background: #2c1616;
        color: #ffb5b5;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Hyperscape Desktop Downloads</h1>
      <p class="subtitle">
        Official installers from the latest tagged GitHub release.
      </p>

      <section class="meta" id="release-meta">
        <p>Loading latest release metadata...</p>
      </section>

      <section class="grid" id="downloads-grid"></section>

      <section class="asset-list" id="asset-list">
        <h3>All Release Assets</h3>
        <p>Loading assets...</p>
      </section>

      <p class="footer">
        Release source:
        <a href="https://github.com/HyperscapeAI/hyperscape/releases" target="_blank" rel="noreferrer">
          github.com/HyperscapeAI/hyperscape/releases
        </a>
      </p>
    </main>

    <script>
      const repo = "HyperscapeAI/hyperscape";
      const releasesBase = `https://api.github.com/repos/${repo}/releases`;

      const releaseMetaEl = document.getElementById("release-meta");
      const downloadsGridEl = document.getElementById("downloads-grid");
      const assetListEl = document.getElementById("asset-list");

      const byName = (asset) => asset.name.toLowerCase();
      const findAsset = (assets, matcher) => assets.find((asset) => matcher(byName(asset)));

      const macDmgAssets = (assets) => assets.filter((asset) => byName(asset).endsWith(".dmg"));

      async function fetchLatestRelease() {
        const latestResp = await fetch(`${releasesBase}/latest`);
        if (latestResp.ok) {
          return await latestResp.json();
        }

        const listResp = await fetch(`${releasesBase}?per_page=20`);
        if (!listResp.ok) {
          throw new Error("Failed to fetch release list from GitHub API.");
        }

        const releases = await listResp.json();
        const fallback = releases.find((release) => !release.draft) || releases[0];
        if (!fallback) {
          throw new Error("No releases found.");
        }
        return fallback;
      }

      function renderReleaseMeta(release) {
        const when = new Date(release.published_at || release.created_at).toLocaleString();
        const kind = release.prerelease ? "Prerelease" : "Stable release";

        releaseMetaEl.innerHTML = `
          <p><strong>${kind}</strong> ${release.tag_name}</p>
          <p>Published: ${when}</p>
          <p><a href="${release.html_url}" target="_blank" rel="noreferrer">View release notes</a></p>
        `;
      }

      function renderDownloadCards(release) {
        const assets = release.assets || [];
        const dmgs = macDmgAssets(assets);

        const macArm =
          findAsset(dmgs, (name) => name.includes("arm64") || name.includes("aarch64")) || null;
        const macIntel =
          findAsset(dmgs, (name) => name.includes("x64") || name.includes("intel")) ||
          dmgs.find((asset) => !/(arm64|aarch64)/.test(byName(asset))) ||
          null;

        const windows =
          findAsset(assets, (name) => name.endsWith(".msi")) ||
          findAsset(assets, (name) => name.endsWith(".exe")) ||
          null;

        const linux =
          findAsset(assets, (name) => name.endsWith(".appimage")) ||
          findAsset(assets, (name) => name.endsWith(".deb")) ||
          findAsset(assets, (name) => name.endsWith(".rpm")) ||
          null;

        const ios = findAsset(assets, (name) => name.endsWith(".ipa")) || null;
        const android =
          findAsset(assets, (name) => name.endsWith(".aab")) ||
          findAsset(assets, (name) => name.endsWith(".apk")) ||
          null;

        const cards = [
          {
            title: "macOS (Apple Silicon)",
            description: "Native arm64 build.",
            asset: macArm,
          },
          {
            title: "macOS (Intel)",
            description: "x64 build for Intel Macs.",
            asset: macIntel,
          },
          {
            title: "Windows",
            description: "Installer for Windows 10/11.",
            asset: windows,
          },
          {
            title: "Linux",
            description: "AppImage/Deb/RPM depending on release assets.",
            asset: linux,
          },
          {
            title: "iOS",
            description: "IPA artifact from CI release build.",
            asset: ios,
          },
          {
            title: "Android",
            description: "AAB/APK artifact from CI release build.",
            asset: android,
          },
        ];

        downloadsGridEl.innerHTML = cards
          .map((card) => {
            if (!card.asset) {
              return `
                <article class="card">
                  <h2>${card.title}</h2>
                  <p>${card.description}</p>
                  <p class="missing">Not available in this release.</p>
                </article>
              `;
            }

            return `
              <article class="card">
                <h2>${card.title}</h2>
                <p>${card.description}</p>
                <a class="btn" href="${card.asset.browser_download_url}">${card.asset.name}</a>
              </article>
            `;
          })
          .join("");
      }

      function renderAllAssets(release) {
        const assets = release.assets || [];
        if (!assets.length) {
          assetListEl.innerHTML = "<h3>All Release Assets</h3><p>No assets attached to this release.</p>";
          return;
        }

        const items = assets
          .map(
            (asset) =>
              `<li><a href="${asset.browser_download_url}">${asset.name}</a> (${(asset.size / (1024 * 1024)).toFixed(1)} MB)</li>`,
          )
          .join("");

        assetListEl.innerHTML = `<h3>All Release Assets</h3><ul>${items}</ul>`;
      }

      async function main() {
        try {
          const release = await fetchLatestRelease();
          renderReleaseMeta(release);
          renderDownloadCards(release);
          renderAllAssets(release);
        } catch (error) {
          console.error(error);
          const message = error instanceof Error ? error.message : "Unknown error";
          releaseMetaEl.innerHTML = `<div class="error">Failed to load release metadata: ${message}</div>`;
          downloadsGridEl.innerHTML = "";
          assetListEl.innerHTML = "";
        }
      }

      main();
    </script>
  </body>
</html>
